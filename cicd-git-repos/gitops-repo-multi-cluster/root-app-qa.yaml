apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: inventory-order-app-qa
  namespace: argocd
spec:
  destination:
    namespace: default
    server: https://35.224.24.120   # Local Docker Desktop cluster
  source:
    path: environments/qa/apps
    repoURL: https://github.com/ramanujds/gitops-repo-multi-cluster
    targetRevision: HEAD
  sources: []
  project: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      enabled: true